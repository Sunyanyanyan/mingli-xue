    19|<h1 class="title">第3课：地支——你的原生环境</h1>
    20|
    21|<div class="series-tag"><p>椰子要破壳 · 八字入门系列 · 第3课</p></div>
    22|
    23|<hr class="divider">
    24|
    25|
    26|<p>上次讲了天干——十个性格鲜明的小伙伴。今天讲下半部分：<strong>地支</strong>。</p>
    27|
    28|<div class="scene">
    29|<p>你朋友圈发的照片，和你凌晨三点起来喂奶的样子——同一个人，两张脸。</p>
    30|<p>天干是你<strong>看起来怎样</strong>（精心选过的照片）。<br>
    31|地支是你<strong>实际上怎样</strong>（没滤镜的真实样子）。</p>
    32|<p>天干在上，地支在下。上面那个字是你演给别人看的。下面那个字是你骨子里的底色。</p>
    33|</div>
    34|
    35|<hr class="divider">
    36|
    37|<h2>地支的三重身份</h2>
    38|
    39|<p>十二个地支，每个都有三个功能。</p>
    40|
    41|<h3>第一重：代表时间</h3>
    42|
    43|<p>一天十二个时辰，每个两小时：</p>
    44|
    45|<div class="concept-list">
    46|  <div class="concept-item"><span class="name">子</span><span class="desc">23:00–01:00</span></div>
    47|  <div class="concept-item"><span class="name">丑</span><span class="desc">01:00–03:00</span></div>
    48|  <div class="concept-item"><span class="name">寅</span><span class="desc">03:00–05:00</span></div>
    49|  <div class="concept-item"><span class="name">卯</span><span class="desc">05:00–07:00</span></div>
    50|  <div class="concept-item"><span class="name">辰</span><span class="desc">07:00–09:00</span></div>
    51|  <div class="concept-item"><span class="name">巳</span><span class="desc">09:00–11:00</span></div>
    52|  <div class="concept-item"><span class="name">午</span><span class="desc">11:00–13:00</span></div>
    53|  <div class="concept-item"><span class="name">未</span><span class="desc">13:00–15:00</span></div>
    54|  <div class="concept-item"><span class="name">申</span><span class="desc">15:00–17:00</span></div>
    55|  <div class="concept-item"><span class="name">酉</span><span class="desc">17:00–19:00</span></div>
    56|  <div class="concept-item"><span class="name">戌</span><span class="desc">19:00–21:00</span></div>
    57|  <div class="concept-item"><span class="name">亥</span><span class="desc">21:00–23:00</span></div>
    58|</div>
    59|
    60|<h3>第二重：代表月份</h3>
    61|
    62|<p>寅是正月（春），卯是二月，辰三月……一路到子十一月，丑十二月。</p>
    63|
    64|<h3>第三重：代表生肖</h3>
    65|
    66|<p>子鼠、丑牛、寅虎、卯兔、辰龙、巳蛇、午马、未羊、申猴、酉鸡、戌狗、亥猪。</p>
    67|
    68|<div class="qa">
    69|<p><span class="q">问：</span> 同一个地支的人性格都一样吗？</p>
    70|<p>不一样。都属牛（丑），但生在春天的牛和生在冬天的牛，完全两码事。地支本身是静态的，<strong>月令（月支）决定它能量强不强</strong>。后面讲五行的时候会展开。</p>
    71|</div>
    72|
    73|<hr class="divider">
    74|
    75|<h2>地支也分阴阳五行</h2>
    76|
    77|<div class="concept-list">
    78|  <div class="concept-item"><span class="name">子</span><span class="desc">水·阳·鼠——聪明灵活</span></div>
    79|  <div class="concept-item"><span class="name">丑</span><span class="desc">土·阴·牛——踏实能扛</span></div>
    80|  <div class="concept-item"><span class="name">寅</span><span class="desc">木·阳·虎——有冲劲</span></div>
    81|  <div class="concept-item"><span class="name">卯</span><span class="desc">木·阴·兔——温柔敏感</span></div>
    82|  <div class="concept-item"><span class="name">辰</span><span class="desc">土·阳·龙——包容多变</span></div>
    83|  <div class="concept-item"><span class="name">巳</span><span class="desc">火·阴·蛇——机灵有城府</span></div>
    84|  <div class="concept-item"><span class="name">午</span><span class="desc">火·阳·马——热情大方</span></div>
    85|  <div class="concept-item"><span class="name">未</span><span class="desc">土·阴·羊——温和顾家</span></div>
    86|  <div class="concept-item"><span class="name">申</span><span class="desc">金·阳·猴——机灵聪明</span></div>
    87|  <div class="concept-item"><span class="name">酉</span><span class="desc">金·阴·鸡——精致讲究</span></div>
    88|  <div class="concept-item"><span class="name">戌</span><span class="desc">土·阳·狗——忠诚直率</span></div>
    89|  <div class="concept-item"><span class="name">亥</span><span class="desc">水·阴·猪——随和享受</span></div>
    90|</div>
    91|
    92|<hr class="divider">
    93|
    94|<h2>举个例子</h2>
    95|
    96|<p>假设一个人的地支是：<strong>巳 申 子 辰</strong></p>
    97|
    98|<ul>
    99|<li><strong>巳</strong>（年支，出生年份环境）→ 火旺，属蛇。出生那年像"夏天开局"，底色偏热</li>
   100|<li><strong>申</strong>（月支，成长环境）→ 金旺，属猴。成长过程里灵活善变、规矩多</li>
   101|<li><strong>子</strong>（日支，婚姻/内心）→ 水旺，属鼠。内在聪明细腻</li>
   102|<li><strong>辰</strong>（时支，晚年/孩子）→ 土，属龙。晚年稳定包容</li>
   103|</ul>
   104|
   105|<hr class="divider">
   106|
   107|<h2>本课小结</h2>
   108|
   109|<ul class="summary">
   110|<li>地支是"底色"，决定<strong>原生环境和内在状态</strong></li>
   111|<li>每个地支有<strong>时间、月份、生肖</strong>三重身份</li>
   112|<li>天干是"演出来的"，地支是"骨子里的"</li>
   113|<li>阴阳五行属性都要看——火和土不一样，阳水和阴水也不一样</li>
   114|</ul>
   115|
   116|
   117|<hr class="divider">
   118|
   119|<div class="emphasis-line">下次听人说"你属X和属Y不合"，先别信。<br>地支要看全盘，不是看一个字。</div>
