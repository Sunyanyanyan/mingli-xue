    10|<div class="header"><div class="coconut">🥥</div><h1>椰子要破壳</h1><p class="sub">用生活讲八字 · 入门系列</p></div>
    11|<hr class="divider">
    12|<h1 class="title">第6课：十神（上）——谁在管你，谁在帮你</h1>
    13|<div class="series-tag"><p>椰子要破壳 · 八字入门系列 · 第6课</p></div>
    14|<hr class="divider">
    15|
    16|<p>前面五课，地基打好了。天干、地支、五行、藏干——现在你手上有足够的东西，能学最实用的一块了：<strong>十神</strong>。</p>
    17|
    18|<div class="scene">
    19|<p>十神是什么？</p>
    20|<p>就是你和其他天干的关系。<br>
    21|像你生活里的人：管你的、帮你的、你宠的、你压得住的、跟你并肩走的。</p>
    22|<p>每个人在你这儿都有一个"角色"。十神就是给这些角色起的名。</p>
    23|</div>
    24|
    25|<hr class="divider">
    26|
    27|<h2>怎么算？用你已经会的</h2>
    28|
    29|<p>十神不是新东西。它来自你已经学会的两样：<strong>五行生克 + 阴阳</strong>。</p>
    30|
    31|<p>今天用<strong>辛金</strong>日主来演示。假设你日干是辛金（一颗精致的珠宝）。</p>
    32|
    33|<p>先回忆生克：</p>
    34|<div class="five-line">火 → 土 → 金 → 水 → 木 → 火</div>
    35|
    36|<ul>
    37|<li><strong>火克金</strong>：火能把金烧化——克你的</li>
    38|<li><strong>土生金</strong>：土里出矿石——生你的</li>
    39|<li><strong>金生水</strong>：金属凝水珠——你生的</li>
    40|<li><strong>金克木</strong>：斧头砍树——你克的</li>
    41|<li><strong>金同金</strong>：跟你一样——同你的</li>
    42|</ul>
    43|
    44|<div class="emphasis-line">五种关系，每种分阴阳 → 十个十神。</div>
    45|
    46|<hr class="divider">
    47|
    48|<h2>五种关系 × 阴阳 = 十个名字</h2>
    49|
    50|<div class="concept-list">
    51|  <div class="concept-item"><span class="name">克你的·火</span><span class="desc">丙火（阳，异）→ 正官 &nbsp;|&nbsp; 丁火（阴，同）→ 七杀</span></div>
    52|  <div class="concept-item"><span class="name">生你的·土</span><span class="desc">戊土（阳，异）→ 正印 &nbsp;|&nbsp; 己土（阴，同）→ 偏印</span></div>
    53|  <div class="concept-item"><span class="name">你生的·水</span><span class="desc">壬水（阳，异）→ 伤官 &nbsp;|&nbsp; 癸水（阴，同）→ 食神</span></div>
    54|  <div class="concept-item"><span class="name">你克的·木</span><span class="desc">甲木（阳，异）→ 正财 &nbsp;|&nbsp; 乙木（阴，同）→ 偏财</span></div>
    55|  <div class="concept-item"><span class="name">同你的·金</span><span class="desc">庚金（阳，异）→ 劫财 &nbsp;|&nbsp; 辛金（阴，同）→ 比肩</span></div>
    56|</div>
    57|
    58|<p>规律：<strong>阴阳相反的叫"正"，阴阳相同的叫"偏/七"。</strong></p>
    59|
    60|<hr class="divider">
    61|
    62|<h2>先讲克你的一组：正官和七杀</h2>
    63|
    64|<p>火克金。火烧金子，能炼出更好的形状——也能直接烧化。</p>
    65|
    66|<h3>正官（丙火）——温和熔炉</h3>
    67|<p>像打金匠的炉火，温度刚好，慢慢把金炼成型。有规则，有边界，但不过火。</p>
    68|
    69|<div class="scene">
    70|<p>打个比方：你在一个活动里做主持人，活动负责人提前给你对了一遍流程，说你名字念错了帮你纠正。不是骂你，是在帮你做得更好。</p>
    71|</div>
    72|
    73|<p><strong>现实中什么意思：</strong></p>
    74|<ul>
    75|<li>守规矩、靠谱、有责任感</li>
    76|<li>被人管但不难受</li>
    77|<li>适合稳定、有规则的岗位</li>
    78|</ul>
    79|<p><strong>多了会怎样：</strong>太死板，不敢越雷池一步。</p>
    80|
    81|<hr class="divider">
    82|
    83|<h3>七杀（丁火）——烈焰熔炉</h3>
    84|<p>像一把猛火直接烧上来，温度太高，金子要化了。压力大、力道狠、不留情面。</p>
    85|
    86|<div class="scene">
    87|<p>打个比方：你负责一个新项目，谁都没做过，老板说"月底必须交"。没人教、没人帮、错了自己扛。</p>
    88|</div>
    89|
    90|<p><strong>现实中什么意思：</strong></p>
    91|<ul>
    92|<li>有冲劲、不服输、能扛事</li>
    93|<li>但压力大，容易崩</li>
    94|<li>适合创业、带团队、做突破性的事</li>
    95|</ul>
    96|<p><strong>多了会怎样：</strong>长期高压，自己逼自己，脾气上来压不住。</p>
    97|
    98|<div class="qa">
    99|<p><span class="q">问：</span> 正官好还是七杀好？</p>
   100|<p><strong>看你的承受力。</strong></p>
   101|<p>拿辛金做人——身弱的辛金像一枚精细的首饰，正官的温和火可以慢慢打磨它，七杀的猛火只会把它烧坏。<br>
   102|一个身旺的庚金（大刀）——正官反而像镣铐让他施展不开，七杀像对手逼他越来越强。</p>
   103|<p><strong>十神本身没有好坏，你的承受力才是判断标准。</strong></p>
   104|</div>
   105|
   106|<hr class="divider">
   107|
   108|<h2>生你的一组：正印和偏印</h2>
   109|
   110|<p>土生金。土是生你的，是你的靠山和补给。</p>
   111|
   112|<h3>正印（戊土）——城墙护着你</h3>
   113|<p>像一道城墙围在外面，风刮不进来。给你安全感。</p>
   114|
   115|<div class="scene">
   116|<p>打个比方：你出差一周回来，婆婆把家里收拾好了、冰箱塞满了。不用你开口。</p>
   117|</div>
   118|
   119|<p><strong>现实中什么意思：</strong></p>
   120|<ul>
   121|<li>心善、有人帮、有贵人</li>
   122|<li>学习是慢慢吸收型的</li>
   123|<li>适合教育、写作、研究</li>
   124|</ul>
   125|<p><strong>多了会怎样：</strong>太依赖别人，自己没了主见。</p>
   126|
   127|<hr class="divider">
   128|
   129|<h3>偏印（己土）——园土悄悄养</h3>
   130|<p>像花园里的泥土，安静地滋养。外面看不出来，底下一直在养活。</p>
   131|
   132|<div class="scene">
   133|<p>打个比方：你遇到一个难题，翻了几天资料没人能问。有天晚上突然自己想通了——没人教你，但答案自己冒出来了。</p>
   134|</div>
   135|
   136|<p><strong>现实中什么意思：</strong></p>
   137|<ul>
   138|<li>聪明、想得多、不走寻常路</li>
   139|<li>适合命理、中医、艺术这些偏门学问</li>
   140|<li>但容易钻牛角尖</li>
   141|</ul>
   142|<p><strong>多了会怎样：</strong>想太多，别人听不懂你在说什么。</p>
   143|
   144|<div class="qa">
   145|<p><span class="q">问：</span> 印多了好不好？</p>
   146|<p>身弱需要印——印是救命稻草。身旺印多——像温室的花，越养越懒。辛金身弱有两三个印不算多，刚好够用。</p>
   147|</div>
   148|
   149|<hr class="divider">
   150|
   151|<h2>本课小结</h2>
   152|<ul class="summary">
   153|<li>十神 = 五行生克 + 阴阳，不是新东西</li>
   154|<li>克你的（正官七杀）管你，生你的（正印偏印）帮你</li>
   155|<li>正：阴阳相反，温和有度。偏/七：阴阳相同，力道更猛</li>
   156|<li>十神没有绝对好坏，看你的承受力</li>
   157|</ul>
   158|
   159|<hr class="divider">
   160|<div class="emphasis-line">今天只讲了四个——管你的和帮你的。<br>下次讲你自己能"生"出来的（才华）和能"克"住的（钱）。</div>
