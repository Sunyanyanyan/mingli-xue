<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>椰子排版 · 公众号一键排版</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --c: #3e2723; --o: #e65100; --d: #bf360c;
  --bg: #fff3e0; --l: #fbe9e7; --m: #8d6e63;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#faf8f5;color:var(--c);min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #f0ece6;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:18px;color:var(--o);display:flex;align-items:center;gap:6px}
.topbar .coco{font-size:22px}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn-go{background:var(--o);color:#fff}
.btn-out{background:#fff;color:var(--o);border:1px solid var(--o)}
.tabs{display:flex;gap:4px;background:#fff;padding:8px 16px;border-bottom:1px solid #f0ece6}
.tab{padding:6px 16px;border:none;background:none;font-size:14px;color:var(--m);border-radius:4px;cursor:pointer}
.tab.on{background:var(--bg);color:var(--o);font-weight:600}
.editor{display:flex;height:calc(100vh - 100px)}
.panel{flex:1;overflow-y:auto;padding:16px}
.panel:first-child{border-right:1px solid #f0ece6}
#input{width:100%;height:100%;border:none;resize:none;font-size:15px;line-height:1.8;font-family:inherit;color:var(--c);background:transparent;outline:none}
#input::placeholder{color:var(--m);opacity:0.5}
#preview{font-size:16px;line-height:1.9;max-width:640px;margin:0 auto;padding:30px 18px 40px;background:#fff;border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
#preview .coco-header{text-align:center;padding:16px 0 8px}
#preview .coco-header .coco{font-size:32px;margin-bottom:4px}
#preview .coco-header h1{font-size:22px;color:#e65100;font-weight:700;margin:0}
#preview .coco-header .sub{color:#8d6e63;font-size:13px;margin:4px 0 0;letter-spacing:1px}
#preview .divider{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}
#preview .title{font-size:22px;color:#e65100;text-align:center;margin:1.5em 0 .8em}
#preview .series-tag{border-left:4px solid #e65100;background:#fff3e0;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}
#preview h2{font-size:18px;color:#bf360c;margin:1.8em 0 .6em;padding-bottom:6px;border-bottom:1px solid #fbe9e7}
#preview h3{font-size:16px;color:#5d4037;margin:1.2em 0 .4em;font-weight:700}
#preview p{margin:.8em 0}
#preview strong{color:#5d4037}
#preview .qa{border-left:4px solid #e65100;background:#fff3e0;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}
#preview .qa .q{font-weight:700;color:#bf360c}
#preview .scene{background:#fafaf6;border:1px solid #e8e4dc;border-radius:8px;padding:14px 16px;margin:1em 0;color:#5d4037}
#preview ul,#preview ol{margin:.6em 0;padding-left:1.4em}
#preview li{margin:.3em 0}
#preview .clist{margin:1em 0}
#preview .clist p{border-bottom:1px solid #f0ece6;padding:10px 0;margin:0}
#preview .clist p:first-child{border-top:1px solid #f0ece6}
#preview .clist .n{font-weight:700;color:#bf360c}
#preview .em-line{text-align:center;color:#bf360c;font-size:17px;font-weight:700;margin:1em 0}
#preview .signature{text-align:center;color:#8d6e63;margin:2em 0 1em}
#preview .signature .brand{color:#e65100;font-weight:700}
#preview .signature .lesson-tag{font-size:13px;margin-top:4px}
#preview table{border-collapse:collapse;width:100%;margin:1em 0;font-size:15px}
#preview th{background:#fff3e0;color:#bf360c;padding:8px 10px;border:1px solid #f0ece6;text-align:center;font-weight:700}
#preview td{padding:8px 10px;border:1px solid #f0ece6;text-align:center;color:#5d4037}
#preview td:first-child{font-weight:700;background:#fafaf6}
#preview hr{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}
#preview .warn{background:#fff8f0;border-left:4px solid #ff8a65;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}
#preview .warn strong{color:#bf360c}
#preview .footer-links{text-align:center;color:#8d6e63;font-size:13px;padding:8px 0;line-height:1.8}
#preview .footer-links a{color:#e65100;text-decoration:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
@media(max-width:768px){
  .editor .panel:last-child{display:none}
  .editor.preview .panel:first-child{display:none}
  .editor.preview .panel:last-child{display:block}
}
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="coco">🥥</span> 椰子排版</h1>
  <button class="btn btn-go" onclick="doCopy()">复制</button>
</div>

<div class="tabs">
  <button class="tab on" onclick="showPanel('edit')">✏️ 编辑</button>
  <button class="tab" onclick="showPanel('preview')">👁 预览</button>
  <button class="tab" onclick="showPanel('both')" style="display:none" id="tab-both">↔ 对照</button>
</div>

<div class="editor" id="editor">
  <div class="panel"><textarea id="input" placeholder="粘贴 Markdown 到这里……"></textarea></div>
  <div class="panel"><div id="preview"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const input = document.getElementById('input');
const preview = document.getElementById('preview');
const editor = document.getElementById('editor');

marked.setOptions({breaks:true,gfm:true});

// Enhanced markdown render with coconut theme
function renderMarkdown(md){
  // Convert blockquotes starting with "问：" to QA divs
  let html = marked.parse(md);
  
  // Wrap in coconut shell
  return html;
}

input.addEventListener('input', ()=>{
  preview.innerHTML = buildCocoPreview(marked.parse(input.value));
});

function buildCocoPreview(html){
  return `<div class="coco-header"><div class="coco">🥥</div><h1>椰子要破壳</h1><p class="sub">用生活讲八字 · 入门系列</p></div>
<hr class="divider">
${html}
<hr class="divider">
<div class="signature"><p><span class="brand">🥥 椰子要破壳</span></p><p class="lesson-tag">用生活讲八字 · 入门系列</p></div>
<hr class="divider">
<div class="footer-links"><p>📖 <a href="https://sunyanyanyan.github.io/mingli-xue/">椰子要破壳 · 八字入门</a></p><p style="color:#bcaaa4">原创文章 · 转载请联系作者</p></div>`;
}

// Read lesson title from markdown for page title
function guessTitle(md){
  const m = md.match(/^#\s*(.+)/m);
  return m ? m[1].replace(/\*\*/g,'') : '椰子要破壳';
}

function showPanel(mode){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(mode==='edit'){editor.classList.remove('preview');document.querySelector('.tabs .tab:first-child').classList.add('on')}
  if(mode==='preview'){editor.classList.add('preview');document.querySelector('.tabs .tab:last-child').classList.add('on')}
}

// Copy as WeChat-safe inline HTML with full coconut theme
function doCopy(){
  const md = input.value.trim();
  if(!md) return toast('先粘贴内容');
  const parsed = marked.parse(md);
  const title = guessTitle(md);
  
  // Build full coconut-themed HTML
  const bodyContent = `
<div class="header"><div class="coconut">🥥</div><h1>椰子要破壳</h1><p class="sub">用生活讲八字 · 入门系列</p></div>
<hr class="divider">
${parsed}
<hr class="divider">
<div class="signature"><p><span class="brand">🥥 椰子要破壳</span></p><p class="lesson-tag">用生活讲八字 · 入门系列</p></div>
<hr class="divider">
<div class="footer-links"><p>📖 <a href="https://sunyanyanyan.github.io/mingli-xue/">椰子要破壳 · 八字入门</a></p><p style="color:#bcaaa4">原创文章 · 转载请联系作者</p></div>`;

  const bodyStyle = 'max-width:640px;margin:0 auto;padding:30px 18px 40px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:16px;line-height:1.9;color:#3e2723;background:#fff';
  const css = '.header{text-align:center;padding:16px 0 8px}.header .coconut{font-size:32px;margin-bottom:4px}.header h1{font-size:22px;color:#e65100;font-weight:700;margin:0}.header .sub{color:#8d6e63;font-size:13px;margin:4px 0 0;letter-spacing:1px}.divider{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}.title{font-size:22px;color:#e65100;text-align:center;margin:1.5em 0 .8em}.series-tag{border-left:4px solid #e65100;background:#fff3e0;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}h2{font-size:18px;color:#bf360c;margin:1.8em 0 .6em;padding-bottom:6px;border-bottom:1px solid #fbe9e7}h3{font-size:16px;color:#5d4037;margin:1.2em 0 .4em;font-weight:700}p{margin:.8em 0}strong{color:#5d4037}.qa{border-left:4px solid #e65100;background:#fff3e0;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}.qa .q{font-weight:700;color:#bf360c}.scene{background:#fafaf6;border:1px solid #e8e4dc;border-radius:8px;padding:14px 16px;margin:1em 0;color:#5d4037}ul,ol{margin:.6em 0;padding-left:1.4em}li{margin:.3em 0}.clist{margin:1em 0}.clist p{border-bottom:1px solid #f0ece6;padding:10px 0;margin:0}.clist p:first-child{border-top:1px solid #f0ece6}.clist .n{font-weight:700;color:#bf360c}.five-line{text-align:center;font-size:15px;letter-spacing:4px;margin:1em 0;color:#5d4037}.signature{text-align:center;color:#8d6e63;margin:2em 0 1em}.signature .brand{color:#e65100;font-weight:700}.signature .lesson-tag{font-size:13px;margin-top:4px}.preview{text-align:center;color:#8d6e63;font-size:15px;margin:.8em 0}.footer-links{text-align:center;color:#8d6e63;font-size:13px;padding:8px 0;line-height:1.8}.footer-links a{color:#e65100;text-decoration:none}.em-line{text-align:center;color:#bf360c;font-size:17px;font-weight:700;margin:1em 0}.warn{background:#fff8f0;border-left:4px solid #ff8a65;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}.warn strong{color:#bf360c}table{border-collapse:collapse;width:100%;margin:1em 0;font-size:15px}th{background:#fff3e0;color:#bf360c;padding:8px 10px;border:1px solid #f0ece6;text-align:center;font-weight:700}td{padding:8px 10px;border:1px solid #f0ece6;text-align:center;color:#5d4037}td:first-child{font-weight:700;background:#fafaf6}';

  const full = `<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${title}</title><style>${css}</style></head><body style="${bodyStyle}">${bodyContent}</body></html>`;

  navigator.clipboard.write([
    new ClipboardItem({
      'text/html': new Blob([full],{type:'text/html'}),
      'text/plain': new Blob([md],{type:'text/plain'})
    })
  ]).then(()=>toast('✅ 已复制！去公众号粘贴')).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = full;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ 已复制！');
  });
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Load sample
input.value = `# 第0课：先看地图——八字到底在说什么

> 椰子要破壳 · 八字入门系列 · 第0课

---

很多人学八字，上来就背天干地支、背五行生克、背十神表。

错了。

**你应该先站远一步，看整张地图。**

---

## 八字不是算命，是读说明书

你买了一台车，车上有一本**说明书**。

八字就是你的生命说明书。不是告诉你「几岁发财」的算命书，而是告诉你：

**你是辆什么车、烧什么油、走什么路最舒服。**

- 有人是越野车，非要去跑赛道 → 累死
- 有人是跑车，非要去爬山路 → 底盘刮烂

**八字不是改你的命，是让你别用错自己。**

---

## 八个字 = 四柱 × 2

> **年柱、月柱、日柱、时柱——四个柱子，每个分上下两个字。**
> 上面叫天干（外显），下面叫地支（底色）。

日柱上面的天干叫「日主」——那是你。整个八字围绕你一个人展开。`;
preview.innerHTML = buildCocoPreview(marked.parse(input.value));

// Show both tabs on desktop
if(window.innerWidth>768) document.getElementById('tab-both').style.display='';
</script>
</body>
</html>
