<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>椰子排版 · 公众号一键排版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<style>
:root{--c:#3e2723;--o:#e65100;--d:#bf360c;--bg:#fff3e0;--l:#fbe9e7;--m:#8d6e63}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#faf8f5;color:var(--c);min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #f0ece6;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:18px;color:var(--o);display:flex;align-items:center;gap:6px}
.topbar .coco{font-size:22px}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn-go{background:var(--o);color:#fff}
.btn-out{background:#fff;color:var(--o);border:1px solid var(--o)}
.tabs{display:flex;gap:4px;background:#fff;padding:8px 16px;border-bottom:1px solid #f0ece6;position:sticky;top:48px;z-index:9}
.tab{padding:6px 16px;border:none;background:none;font-size:14px;color:var(--m);border-radius:4px;cursor:pointer}
.tab.on{background:var(--bg);color:var(--o);font-weight:600}
.editor{display:flex;height:calc(100vh - 85px)}
.panel{flex:1;overflow-y:auto;padding:16px}
.panel:first-child{border-right:1px solid #f0ece6}
#input{width:100%;height:100%;border:none;resize:none;font-size:15px;line-height:1.8;font-family:inherit;color:var(--c);background:transparent;outline:none}
#input::placeholder{color:var(--m);opacity:0.5}
#preview{max-width:640px;margin:0 auto;background:#fff;border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
#preview .coco-wrap{padding:30px 18px 40px;font-size:16px;line-height:1.9;color:#3e2723}
#preview .coco-wrap .hd{text-align:center;padding:16px 0 8px}
#preview .coco-wrap .hd .icon{font-size:32px;margin-bottom:4px}
#preview .coco-wrap .hd .bn{font-size:22px;color:#e65100;font-weight:700;margin:0}
#preview .coco-wrap .hd .sb{color:#8d6e63;font-size:13px;margin:4px 0 0;letter-spacing:1px}
#preview .coco-wrap .hr{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}
#preview .coco-wrap h1{font-size:22px;color:#e65100;text-align:center;margin:1.5em 0 .8em;font-weight:700}
#preview .coco-wrap h2{font-size:18px;color:#bf360c;margin:1.8em 0 .6em;padding-bottom:6px;border-bottom:1px solid #fbe9e7;font-weight:700}
#preview .coco-wrap h3{font-size:16px;color:#5d4037;margin:1.2em 0 .4em;font-weight:700}
#preview .coco-wrap p{margin:.8em 0;color:#3e2723}
#preview .coco-wrap strong{color:#5d4037}
#preview .coco-wrap em{color:#5d4037}
#preview .coco-wrap blockquote{border-left:4px solid #e65100;background:#fff3e0;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}
#preview .coco-wrap blockquote p{margin:0.4em 0}
#preview .coco-wrap ul,#preview .coco-wrap ol{margin:.6em 0;padding-left:1.4em}
#preview .coco-wrap li{margin:.3em 0}
#preview .coco-wrap table{border-collapse:collapse;width:100%;margin:1em 0;font-size:15px}
#preview .coco-wrap th{background:#fff3e0;color:#bf360c;padding:8px 10px;border:1px solid #f0ece6;text-align:center;font-weight:700}
#preview .coco-wrap td{padding:8px 10px;border:1px solid #f0ece6;text-align:center;color:#5d4037}
#preview .coco-wrap hr{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}
#preview .coco-wrap .sg{text-align:center;color:#8d6e63;margin:2em 0 1em}
#preview .coco-wrap .sg .br{color:#e65100;font-weight:700}
#preview .coco-wrap .sg .lt{font-size:13px;margin-top:4px}
#preview .coco-wrap .ft{text-align:center;color:#8d6e63;font-size:13px;padding:8px 0;line-height:1.8}
#preview .coco-wrap .ft a{color:#e65100;text-decoration:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="coco">🥥</span> 椰子排版</h1>
  <button class="btn btn-go" onclick="doCopy()">复制</button>
</div>

<div class="tabs">
  <button class="tab on" id="tab-edit" onclick="showPanel('edit')">✏️ 编辑</button>
  <button class="tab" id="tab-preview" onclick="showPanel('preview')">👁 预览</button>
  <button class="tab" id="tab-both" onclick="showPanel('both')" style="display:none">↔ 对照</button>
</div>

<div class="editor" id="editor">
  <div class="panel" id="panel-edit"><textarea id="input" placeholder="粘贴 Markdown 到这里……"></textarea></div>
  <div class="panel" id="panel-preview"><div id="preview"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const input = document.getElementById('input');
const preview = document.getElementById('preview');
const panelEdit = document.getElementById('panel-edit');
const panelPreview = document.getElementById('panel-preview');
const tabEdit = document.getElementById('tab-edit');
const tabPreview = document.getElementById('tab-preview');
const tabBoth = document.getElementById('tab-both');

// Guard: marked CDN fallback
if(typeof marked === 'undefined'){
  window.marked = { parse: s => s, setOptions: ()=>{}, options: {} };
}

marked.setOptions({breaks:true,gfm:true});

function wrapCoco(html, title){
  const t = title || '椰子要破壳';
  return `<div class="coco-wrap">
<div class="hd"><div class="icon">🥥</div><div class="bn">椰子要破壳</div><div class="sb">用生活讲八字 · 入门系列</div></div>
<hr class="hr">
${html}
<hr class="hr">
<div class="sg"><span class="br">🥥 椰子要破壳</span><div class="lt">用生活讲八字 · 入门系列</div></div>
<hr class="hr">
<div class="ft">📖 <a href="https://sunyanyanyan.github.io/mingli-xue/">椰子要破壳 · 八字入门</a><div style="color:#bcaaa4">原创文章 · 转载请联系作者</div></div>
</div>`;
}

function guessTitle(md){
  const m = md.match(/^#\s*(.+)/m);
  return m ? m[1].replace(/\*\*/g,'').trim() : '';
}

input.addEventListener('input', ()=>{
  const html = marked.parse(input.value);
  preview.innerHTML = wrapCoco(html, guessTitle(input.value));
});

function showPanel(mode){
  tabEdit.classList.remove('on');
  tabPreview.classList.remove('on');
  tabBoth.classList.remove('on');
  if(mode==='edit'){
    panelEdit.style.display = 'flex';
    panelPreview.style.display = 'none';
    tabEdit.classList.add('on');
  } else if(mode==='preview'){
    panelEdit.style.display = 'none';
    panelPreview.style.display = 'block';
    tabPreview.classList.add('on');
  } else if(mode==='both'){
    panelEdit.style.display = 'flex';
    panelPreview.style.display = 'block';
    tabBoth.classList.add('on');
  }
}

function doCopy(){
  const md = input.value.trim();
  if(!md) return toast('先粘贴内容');
  const parsed = marked.parse(md);
  const t = guessTitle(md);

  const bodyCss = 'max-width:640px;margin:0 auto;padding:30px 18px 40px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:16px;line-height:1.9;color:#3e2723;background:#fff;overflow-wrap:break-word;word-break:break-word';
  const css = '.coco{max-width:640px;margin:0 auto}.coco .hd{text-align:center;padding:16px 0 8px}.coco .hd .ic{font-size:32px;margin-bottom:4px}.coco .hd h1{font-size:22px;color:#e65100;font-weight:700;margin:0}.coco .hd .sb{color:#8d6e63;font-size:13px;margin:4px 0 0;letter-spacing:1px}.coco .div{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}.coco h1{font-size:22px;color:#e65100;text-align:center;margin:1.5em 0 .8em;font-weight:700}.coco h2{font-size:18px;color:#bf360c;margin:1.8em 0 .6em;padding-bottom:6px;border-bottom:1px solid #fbe9e7}.coco h3{font-size:16px;color:#5d4037;margin:1.2em 0 .4em;font-weight:700}.coco p{margin:.8em 0}.coco strong{color:#5d4037}.coco blockquote{border-left:4px solid #e65100;background:#fff3e0;padding:12px 16px;margin:1em 0;border-radius:0 6px 6px 0;color:#5d4037}.coco blockquote p{margin:0.4em 0}.coco ul,.coco ol{margin:.6em 0;padding-left:1.4em}.coco li{margin:.3em 0}.coco table{border-collapse:collapse;width:100%;margin:1em 0;font-size:15px}.coco th{background:#fff3e0;color:#bf360c;padding:8px 10px;border:1px solid #f0ece6;text-align:center;font-weight:700}.coco td{padding:8px 10px;border:1px solid #f0ece6;text-align:center;color:#5d4037}.coco hr{border:none;height:1px;background:#e65100;margin:18px 0;opacity:0.3}.coco .sg{text-align:center;color:#8d6e63;margin:2em 0 1em}.coco .sg .br{color:#e65100;font-weight:700}.coco .sg .lt{font-size:13px;margin-top:4px}.coco .ft{text-align:center;color:#8d6e63;font-size:13px;padding:8px 0;line-height:1.8}.coco .ft a{color:#e65100;text-decoration:none}';

  const body = `<div class="coco">
<div class="hd"><div class="ic">🥥</div><h1>椰子要破壳</h1><p class="sb">用生活讲八字 · 入门系列</p></div>
<hr class="div">
${parsed}
<hr class="div">
<div class="sg"><p><span class="br">🥥 椰子要破壳</span></p><p class="lt">用生活讲八字 · 入门系列</p></div>
<hr class="div">
<div class="ft"><p>📖 <a href="https://sunyanyanyan.github.io/mingli-xue/">椰子要破壳 · 八字入门</a></p><p style="color:#bcaaa4">原创文章 · 转载请联系作者</p></div>
</div>`;

  const full = '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>' + (t || '椰子要破壳') + '</title><style>' + css + '</style></head><body style="' + bodyCss + '">' + body + '</body></html>';

  navigator.clipboard.write([
    new ClipboardItem({
      'text/html': new Blob([full],{type:'text/html'}),
      'text/plain': new Blob([md],{type:'text/plain'})
    })
  ]).then(()=>toast('✅ 已复制！去公众号粘贴')).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = full;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ 已复制！');
  });
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Init
input.value = '';
preview.innerHTML = '';

const isDesktop = window.innerWidth > 768;
if(isDesktop){
  // Desktop: default to both panels visible
  showPanel('edit');
  tabBoth.style.display = '';
} else {
  // Mobile: default to edit only
  panelPreview.style.display = 'none';
}
</script>
</body>
</html>
