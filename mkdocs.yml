site_name: 椰子要破壳 · 八字入门
site_description: 每天10分钟，用生活讲八字
site_url: https://sunyanyanyan.github.io/mingli-xue/
repo_url: https://github.com/Sunyanyanyan/mingli-xue
repo_name: 椰子要破壳
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-night
        name: 夜间模式
    - scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 白天模式
  font: false
  favicon: assets/logo.svg
  logo: assets/logo.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
    - header.autohide
    - announce.dismiss

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - 首页: index.md
  - 📖 课程:
    - 基础篇:
      - 第0课 先看地图: 八字/第0课-先看地图.md
      - 第1课 什么是八字: 八字/第1课-什么是八字.md
      - 第2课 天干: 八字/第2课-天干.md
      - 第3课 地支: 八字/第3课-地支.md
      - 第4课 五行关系: 八字/第4课-五行关系.md
      - 第5课 藏干: 八字/第5课-藏干.md
    - 进阶篇:
      - 第6课 十神（上）: 八字/第6课-十神-上.md
      - 第7课 十神（下）: 八字/第7课-十神-下.md
      - 第8课 十神组合看性格: 八字/第8课-十神组合看性格.md
  - 📝 小贴士:
    - 十神记忆口诀: 八字/十神记忆口诀-小贴士.md
    - 藏干记忆口诀: 八字/藏干记忆口诀-小贴士.md

docs_dir: docs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sunyanyanyan/mingli-xue
  generator: false

copyright: |
  &copy; 2025 椰子要破壳 ·
  <a href="https://beian.miit.gov.cn/" target="_blank">粤ICP备XXXXXXXX号</a>

extra_css:
  - assets/extra.css
