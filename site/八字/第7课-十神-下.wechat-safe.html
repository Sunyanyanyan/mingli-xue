    10|<div class="header"><div class="coconut">🥥</div><h1>椰子要破壳</h1><p class="sub">用生活讲八字 · 入门系列</p></div>
    11|<hr class="divider">
    12|<h1 class="title">第7课：十神（下）——才华、钱和朋友</h1>
    13|<div class="series-tag"><p>椰子要破壳 · 八字入门系列 · 第7课</p></div>
    14|<hr class="divider">
    15|
    16|<p>上次讲了十神的来历——五行生克加阴阳，分出了十个角色。也讲了管你的人（正官七杀）和帮你的人（正印偏印）。</p>
    17|
    18|<p>今天把剩下的六个一次讲完。还是用<strong>辛金</strong>日主来演示——一颗精致的珠宝，看别人跟你什么关系。</p>
    19|
    20|<hr class="divider">
    21|
    22|<h2>你生的：食神和伤官（才华）</h2>
    23|
    24|<p><strong>金生水。</strong> 你（金）生出了水。水就是你的产出——你表达出来的东西、做出来的成果。</p>
    25|
    26|<h3>伤官（壬水）——大江大河</h3>
    27|<p>像一条大江奔涌而出，挡不住也收不回。想法太多，非说出来不可。</p>
    28|
    29|<div class="scene">
    30|<p>打个比方：你跟朋友出去吃饭，聊到最近看的书，一口气讲了二十分钟。朋友插不上话，但听得很爽。回到家你才想起——"我今天是不是话太多了。"</p>
    31|</div>
    32|
    33|<p><strong>现实中什么意思：</strong></p>
    34|<ul>
    35|<li>外向、敢说、有想法</li>
    36|<li>表达有攻击性——不是故意伤人，是藏不住</li>
    37|<li>适合创作、演讲、输出型工作</li>
    38|</ul>
    39|<p><strong>太多了会怎样：</strong>嘴比脑子快，得罪人。</p>
    40|
    41|<hr class="divider">
    42|
    43|<h3>食神（癸水）——晨露</h3>
    44|<p>像清晨叶子上的露珠，安静地凝在那里，不急也不闹。细细地、慢慢地渗。</p>
    45|
    46|<div class="scene">
    47|<p>打个比方：你花了一整个下午在厨房慢慢熬了一锅汤。不急，火调得小小的，光是看着锅出神都觉得舒服。端上桌的时候，家人说"今天这个汤真好喝"——你也不多解释。</p>
    48|</div>
    49|
    50|<p><strong>现实中什么意思：</strong></p>
    51|<ul>
    52|<li>内秀、温和、有灵气</li>
    53|<li>不爱出风头，但做事讲究</li>
    54|<li>适合写作、手工、研究</li>
    55|</ul>
    56|<p><strong>太多了会怎样：</strong>太懒散，容易满足于现状。</p>
    57|
    58|<div class="qa">
    59|<p><span class="q">问：</span> 伤官和食神，一个外向一个内向？</p>
    60|<p>对。伤官像喷涌的江，藏不住；食神像叶上的露，安静但持久。辛金日主的人如果时柱有个癸水（食神）——有才华但不张扬，更倾向慢慢打磨。</p>
    61|</div>
    62|
    63|<hr class="divider">
    64|
    65|<h2>你克的：正财和偏财（钱）</h2>
    66|
    67|<p><strong>金克木。</strong> 你（金）能驾驭木。木就是钱——你能握住的资源。</p>
    68|
    69|<h3>正财（甲木）——自己种的大树</h3>
    70|<p>自己种的、养的、每天浇水的。慢慢长，年年有。</p>
    71|
    72|<div class="scene">
    73|<p>打个比方：你在公司做了五年，工资每年涨一点。不多，但稳定。你知道下个月还有，明年的年终奖大概多少。这份确定感本身就值钱。</p>
    74|</div>
    75|
    76|<p><strong>现实中什么意思：</strong></p>
    77|<ul>
    78|<li>稳定收入、工资、固定来源</li>
    79|<li>精打细算、不花冤枉钱</li>
    80|<li>适合按部就班的职业</li>
    81|</ul>
    82|<p><strong>太多了会怎样：</strong>太抠门，一辈子攒钱舍不得花。</p>
    83|
    84|<hr class="divider">
    85|
    86|<h3>偏财（乙木）——别人园子里伸过来的花枝</h3>
    87|<p>不是你自己种的，是隔壁邻居家伸过墙来的。也可能是别人送的、突然冒出来的机会。</p>
    88|
    89|<div class="scene">
    90|<p>打个比方：你帮朋友策划了一场活动，结束以后他硬转了一笔钱给你。你没预期、没开口、没报价——但钱到了。拿到这笔钱的时候你第一反应是"那我请大家吃饭吧"。</p>
    91|</div>
    92|
    93|<p><strong>现实中什么意思：</strong></p>
    94|<ul>
    95|<li>副业、投资、奖金、意外之财</li>
    96|<li>大方、敢花、朋友多</li>
    97|<li>适合做生意、需要人脉的事</li>
    98|</ul>
    99|<p><strong>太多了会怎样：</strong>来得快去得也快，攒不住。</p>
   100|
   101|<div class="qa">
   102|<p><span class="q">问：</span> 正财好还是偏财好？</p>
   103|<p>正财是地基，偏财是楼层。没有地基，楼层盖不上去。没有楼层，一辈子住平房。</p>
   104|</div>
   105|
   106|<hr class="divider">
   107|
   108|<h2>同你的：劫财和比肩（朋友对手）</h2>
   109|
   110|<p><strong>金见金。</strong> 跟你一样的人——战友，也是竞争者。</p>
   111|
   112|<h3>劫财（庚金）——抢地盘的邻居</h3>
   113|<p>你们俩都做同一行。他客户比你多两个，你手艺比他精三分。合伙也吵架，分钱也吵架。但遇到外人抢你们生意的时候——他第一个站你旁边。</p>
   114|
   115|<div class="scene">
   116|<p>打个比方：你跟朋友一起做手工皮具去市集摆摊。分钱的时候两个人掰扯了半小时，最后发现隔壁摊卖得太便宜抢了你们生意——五分钟内你们统一了对外报价、统一了口径、甚至连谁负责拉客都分好了。</p>
   117|</div>
   118|
   119|<p><strong>现实中什么意思：</strong></p>
   120|<ul>
   121|<li>朋友、同事、合作伙伴</li>
   122|<li>既帮你，也跟你争</li>
   123|<li>一起扛过事的人关系最铁</li>
   124|</ul>
   125|<p><strong>太多了会怎样：</strong>朋友多但真小人也不少，掏心掏肺容易被坑。</p>
   126|
   127|<hr class="divider">
   128|
   129|<h3>比肩（辛金）——并肩走的人</h3>
   130|<p>你们一样高、一样快，走在一起不抢道。不用说话也知道彼此在想什么。</p>
   131|
   132|<div class="scene">
   133|<p>打个比方：你累了不想说话，朋友也不说话。你们就一起在沙发上坐着。一个小时后她说"饿了吗"，你说"走"。不用解释，不用铺垫。</p>
   134|</div>
   135|
   136|<p><strong>现实中什么意思：</strong></p>
   137|<ul>
   138|<li>知己、真正懂你的人</li>
   139|<li>互助，不互相消耗</li>
   140|<li>数量不多但质量极高</li>
   141|</ul>
   142|<p><strong>太多了会怎样：</strong>太依赖同类，遇到不同频的人不知道怎么相处。</p>
   143|
   144|<div class="qa">
   145|<p><span class="q">问：</span> 劫财和比肩怎么区分？</p>
   146|<p>劫财 = 阴阳不同（庚金阳、辛金阴）。像跟你不一样性格的人——你们互补但也容易摩擦。<br>
   147|比肩 = 阴阳相同（辛金跟辛金）。像跟你一模一样的人——不用解释就懂。</p>
   148|</div>
   149|
   150|<hr class="divider">
   151|
   152|<h2>十个十神，一张画面记住</h2>
   153|
   154|<div class="concept-list">
   155|  <div class="concept-item"><span class="name">正官</span><span class="desc">温和熔炉——有规矩的管</span></div>
   156|  <div class="concept-item"><span class="name">七杀</span><span class="desc">烈焰熔炉——高压的管</span></div>
   157|  <div class="concept-item"><span class="name">正印</span><span class="desc">城墙护着——踏实的安全感</span></div>
   158|  <div class="concept-item"><span class="name">偏印</span><span class="desc">园土暗养——自己悟出来的</span></div>
   159|  <div class="concept-item"><span class="name">伤官</span><span class="desc">大江大河——才华喷涌</span></div>
   160|  <div class="concept-item"><span class="name">食神</span><span class="desc">晨露——才华慢慢渗</span></div>
   161|  <div class="concept-item"><span class="name">正财</span><span class="desc">种的大树——稳定收入</span></div>
   162|  <div class="concept-item"><span class="name">偏财</span><span class="desc">伸来的花枝——意外之财</span></div>
   163|  <div class="concept-item"><span class="name">劫财</span><span class="desc">抢地盘的邻居——又帮又争</span></div>
   164|  <div class="concept-item"><span class="name">比肩</span><span class="desc">并肩的人——真正知己</span></div>
   165|</div>
   166|
   167|<div class="emphasis-line">十个十神全部讲完。你不用背——<br>拿自己的八字对照看一遍，用多了自然记住。</div>
   168|
   169|<hr class="divider">
   170|
   171|<h2>本课小结</h2>
   172|<ul class="summary">
   173|<li>你生的：伤官（江）奔放、食神（露）温润——都是才华</li>
   174|<li>你克的：正财（种树）稳定、偏财（花枝）灵活——都是资源</li>
   175|<li>同你的：劫财（邻居）既帮又争、比肩（并肩）真正知己</li>
   176|<li>十神不是定义你，是帮你认清楚：在这个局面里，谁是什么角色</li>
   177|</ul>
   178|
   179|<hr class="divider">
   180|<div class="emphasis-line">十神学完了。下次你碰到一个人——<br>别急着下判断，先看看他跟你的日主什么关系。<br>是烧你的火，还是护你的土？</div>
