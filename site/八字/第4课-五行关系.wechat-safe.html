    19|<h1 class="title">第4课：五行关系——能量是怎么流动的</h1>
    20|
    21|<div class="series-tag"><p>椰子要破壳 · 八字入门系列 · 第4课</p></div>
    22|
    23|<hr class="divider">
    24|
    25|
    26|<p>前两天讲了天干和地支。今天讲它们背后那个东西——<strong>五行</strong>。天干地支不管怎么变，背后的能源都是五个字：木火土金水。</p>
    27|
    28|<div class="scene">
    29|<p>不是新东西。你在厨房里天天见。</p>
    30|<p>灶台点火要木头（木生火），烧完的灰掉地上（火生土），土里有矿能炼铁（土生金），铁锹挖井水出来（金生水），浇水花就长（水生木）。</p>
    31|<p>就这么简单，一圈循环。五行就是这张图。</p>
    32|</div>
    33|
    34|<hr class="divider">
    35|
    36|<h2>生：A生B，A是B的妈</h2>
    37|
    38|<div class="five-line">木 → 火 → 土 → 金 → 水 → 木</div>
    39|
    40|<p>厨房版：</p>
    41|<ul>
    42|<li><strong>木生火</strong>——往灶里添柴，火烧起来。木头是火的老妈</li>
    43|<li><strong>火生土</strong>——烧完的灰掉地上变土。火是土的老妈</li>
    44|<li><strong>土生金</strong>——土里挖出矿石炼成金属。土是金的老妈</li>
    45|<li><strong>金生水</strong>——用金属工具挖井，水冒出来。金是水的老妈</li>
    46|<li><strong>水生木</strong>——浇水，花草长起来。水是木的老妈</li>
    47|</ul>
    48|
    49|<p>带娃版：宝宝吃奶（水）→长高长大（木的生长）→活蹦乱跳发热（火）</p>
    50|
    51|<hr class="divider">
    52|
    53|<h2>克：A克B，A是B的"管"</h2>
    54|
    55|<div class="five-line">木 — 土 — 水 — 火 — 金 — 木</div>
    56|
    57|<p>也在厨房：</p>
    58|<ul>
    59|<li><strong>木克土</strong>——树根扎进土里把土撑裂。木头管着土地</li>
    60|<li><strong>土克水</strong>——土垒堤坝挡住洪水。泥土管着水</li>
    61|<li><strong>水克火</strong>——水泼上去火灭了。水管着火</li>
    62|<li><strong>火克金</strong>——高温把金属烧化变形。火管着金属</li>
    63|<li><strong>金克木</strong>——斧头砍树锯子锯木头。金属管着木头</li>
    64|</ul>
    65|
    66|<p>带娃版：宝宝积食（土太满）→运动（木疏土），肚子通了。<br>宝宝发烧（火太旺）→多喝水（水灭火），体温降了。</p>
    67|
    68|<div class="qa">
    69|<p><span class="q">问：</span> 怎么记住谁克谁？</p>
    70|<p>排一圈：木→火→土→金→水。隔一个就是克。木克土、土克水、水克火、火克金、金克木。记住"斧头砍树=金克木"一个画面就行，其他类推。</p>
    71|</div>
    72|
    73|<hr class="divider">
    74|
    75|<h2>为什么这些关系重要</h2>
    76|
    77|<p>因为八字里的五行不是孤立的。比如一个人日主是木，地支里有金——金克木，说明长期被"修剪"（环境要求高、自我压力大）。但如果在旁边有水生木，说明有人暗中支持。</p>
    78|
    79|<p>所以看八字不是看"木好不好"，是看：<strong>谁在生你（帮你），谁在克你（压你）。</strong></p>
    80|
    81|<hr class="divider">
    82|
    83|<h2>两个特殊情况</h2>
    84|
    85|<h3>生得太过——"好"过了头</h3>
    86|<p>妈妈太爱孩子，什么事都替孩子做了——孩子反而废了。五行里叫"生多为克"。水太多了，木头被泡烂。</p>
    87|
    88|<h3>克得适当——"管"得刚刚好</h3>
    89|<p>妈妈适当管教，孩子反而长得好。五行里叫"克以为生"。金克木，把歪枝剪掉，树才长直。</p>
    90|
    91|<div class="emphasis-line">八字里没有绝对的好和坏。只有"过了"和"刚刚好"。</div>
    92|
    93|<hr class="divider">
    94|
    95|<h2>本课小结</h2>
    96|<ul class="summary">
    97|<li>相生：木→火→土→金→水→木（循环生）</li>
    98|<li>相克：木→土→水→火→金→木（循环克）</li>
    99|<li>生是"帮"，克是"管"</li>
   100|<li>过度的生＝害，适当的克＝利</li>
   101|<li>八字不是判刑，是看<strong>能量平衡图</strong></li>
   102|</ul>
   103|
   104|
   105|<hr class="divider">
   106|
   107|<div class="emphasis-line">五行不是五个孤立的字。它们在你八字里互相掐架、互相帮忙——<br>后面讲的十神，就是这五种关系的延伸。</div>
