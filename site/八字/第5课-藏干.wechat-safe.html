    10|<div class="header"><div class="coconut">🥥</div><h1>椰子要破壳</h1><p class="sub">用生活讲八字 · 入门系列</p></div>
    11|<hr class="divider">
    12|<h1 class="title">第5课：藏干——看不到的，才是真相</h1>
    13|<div class="series-tag"><p>椰子要破壳 · 八字入门系列 · 第5课</p></div>
    14|<hr class="divider">
    15|
    16|<p>上次学了五行生克。但有一个问题——地支看着只是一个字，难道真就这么单纯？</p>
    17|
    18|<div class="scene">
    19|<p>你见过那种人吗？</p>
    20|<p>表面上斯斯文文、什么都不争，但骨子里倔得要命，认定的事十头牛拉不回来。</p>
    21|<p>这种人，天干上写着"温柔"，地支里藏着"刀剑"。<br>
    22|<strong>藏干，就是你看不到的真相。</strong></p>
    23|</div>
    24|
    25|<hr class="divider">
    26|
    27|<h2>藏干是什么？</h2>
    28|
    29|<p>藏干 = 地支里藏着的天干。</p>
    30|
    31|<p>打个比方：</p>
    32|<ul>
    33|<li><strong>地支</strong> = 一栋房子</li>
    34|<li><strong>藏干</strong> = 房子里住的人</li>
    35|</ul>
    36|
    37|<p>看房子外观——"哦，白墙灰瓦"。推门进去，里面住着三个人，每个人性格都不一样。</p>
    38|
    39|<p>每个地支代表一个节气阶段。阶段交接的时候：</p>
    40|<ul>
    41|<li>还残留着<strong>上一季的气</strong>（叫余气）</li>
    42|<li>正处着<strong>当下最旺的气</strong>（叫本气）</li>
    43|<li>孕育着<strong>下一季的种子</strong>（叫中气）</li>
    44|</ul>
    45|
    46|<hr class="divider">
    47|
    48|<h2>十二地支藏干一览</h2>
    49|
    50|<div class="concept-list">
    51|  <div class="concept-item"><span class="name">子</span><span class="desc">癸 —— 纯水，只藏一个</span></div>
    52|  <div class="concept-item"><span class="name">丑</span><span class="desc">己·癸·辛 —— 土+水+金</span></div>
    53|  <div class="concept-item"><span class="name">寅</span><span class="desc">甲·丙·戊 —— 木+火+土</span></div>
    54|  <div class="concept-item"><span class="name">卯</span><span class="desc">乙 —— 纯木，只藏一个</span></div>
    55|  <div class="concept-item"><span class="name">辰</span><span class="desc">乙·戊·癸 —— 木+土+水</span></div>
    56|  <div class="concept-item"><span class="name">巳</span><span class="desc">丙·戊·庚 —— 火+土+金</span></div>
    57|  <div class="concept-item"><span class="name">午</span><span class="desc">丁·己 —— 火+土</span></div>
    58|  <div class="concept-item"><span class="name">未</span><span class="desc">己·丁·乙 —— 土+火+木</span></div>
    59|  <div class="concept-item"><span class="name">申</span><span class="desc">庚·壬·戊 —— 金+水+土</span></div>
    60|  <div class="concept-item"><span class="name">酉</span><span class="desc">辛 —— 纯金，只藏一个</span></div>
    61|  <div class="concept-item"><span class="name">戌</span><span class="desc">辛·丁·戊 —— 金+火+土</span></div>
    62|  <div class="concept-item"><span class="name">亥</span><span class="desc">壬·甲 —— 水+木</span></div>
    63|</div>
    64|
    65|<div class="qa">
    66|<p><span class="q">问：</span> 必须背下来吗？</p>
    67|<p>不用死背。刚开始截图存手机，用的时候查。就像刚开始当妈也记不住宝宝每顿吃多少毫升，喂多了就记住了。</p>
    68|<p>四个规律帮你：</p>
    69|<p><strong>① 四正（子午卯酉）最单纯</strong> —— 各只藏一两个，像四季中间最纯<br>
    70|<strong>② 四长生（寅申巳亥）最有活力</strong> —— 都藏三个，像种子刚发芽<br>
    71|<strong>③ 四墓库（辰戌丑未）最丰富</strong> —— 都藏三个，像仓库装各种东西<br>
    72|<strong>④ 阴阳不乱</strong> —— 阳支配阳干，阴支配阴干</p>
    73|</div>
    74|
    75|<hr class="divider">
    76|
    77|<h2>举个例子</h2>
    78|
    79|<p>假设一个人是<strong>丁火日主</strong>，地支是：<strong>巳 酉 辰 子</strong></p>
    80|
    81|<div class="concept-list">
    82|  <div class="concept-item"><span class="name">巳（年支）</span><span class="desc">藏丙·戊·庚 —— 火+土+金。年柱环境热，从小有冲劲</span></div>
    83|  <div class="concept-item"><span class="name">酉（月支）</span><span class="desc">藏辛 —— 纯金。成长环境标准高，"你要更好"是常态</span></div>
    84|  <div class="concept-item"><span class="name">辰（日支）</span><span class="desc">藏乙·戊·癸 —— 木+土+水。内心：有弹性（木），能扛事（土），但容易多想（水）</span></div>
    85|  <div class="concept-item"><span class="name">子（时支）</span><span class="desc">藏癸 —— 纯水。晚年内在沉淀，偏安静内敛</span></div>
    86|</div>
    87|
    88|<hr class="divider">
    89|
    90|<h2>藏干告诉我们什么？</h2>
    91|
    92|<p>学会看藏干，就不会被表面骗了。</p>
    93|
    94|<ul>
    95|<li>一个人天干全是丙火（热情），地支藏了一堆癸水（阴冷）<br>
    96|  → <strong>表面大大咧咧，心里特别敏感</strong></li>
    97|<li>一个人天干是柔和的己土，地支藏了庚金（刀剑）<br>
    98|  → <strong>外面好好先生，内心很有原则</strong></li>
    99|</ul>
   100|
   101|<div class="emphasis-line">人不是单面的。每个人都有不被看见的另一面。</div>
   102|
   103|<hr class="divider">
   104|
   105|<h2>本课小结</h2>
   106|<ul class="summary">
   107|<li>藏干 = 地支里藏着的天干</li>
   108|<li>一个地支通常藏2–3个，分本气/中气/余气</li>
   109|<li>看人不能只看表面，要看藏干</li>
   110|<li>四正最单纯、四长生最有活力、四墓库最丰富</li>
   111|</ul>
   112|
   113|<hr class="divider">
   114|<div class="emphasis-line">下次遇到一个人让你意外的反应——<br>别急着下判断，你可能只看到了他的天干。</div>
